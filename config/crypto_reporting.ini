# 统一加密算法测试报告生成系统配置文件
# 支持SM2/SM3/SM4/国际算法的报告模板定义

[general]
# 通用配置
output_format = json,txt
max_report_size_mb = 50
timeout_seconds = 300
enable_performance_metrics = true
enable_environment_info = true

[sm2]
# SM2算法专用配置
algorithm_name = SM2椭圆曲线公钥密码算法
standard = GM/T 0003-2012
test_categories = 基本功能验证,密钥对验证,加密计算验证,解密计算验证,签名计算验证,验签计算验证,向量验证,异常处理
performance_metrics = encryption_speed_kbps,decryption_speed_kbps,signature_speed_ops,verification_speed_ops

[sm3]
# SM3算法专用配置
algorithm_name = SM3密码杂凑算法
standard = GM/T 0004-2012
test_categories = 基本功能验证,向量验证,性能测试,异常处理
performance_metrics = hash_speed_mbps

[sm4]
# SM4算法专用配置
algorithm_name = SM4分组密码算法
standard = GM/T 0002-2012
test_categories = 基本功能验证,ECB模式验证,CBC模式验证,CFB模式验证,OFB模式验证,向量验证,性能测试
performance_metrics = encryption_speed_mbps,decryption_speed_mbps

[aes]
# AES算法配置（国际算法）
algorithm_name = AES分组密码算法
standard = FIPS 197
test_categories = 基本功能验证,ECB模式验证,CBC模式验证,CTR模式验证,向量验证,性能测试
performance_metrics = encryption_speed_mbps,decryption_speed_mbps

[report_template]
# 报告模板定义
json_template = {
    "test_report": {
        "metadata": {
            "report_id": "$REPORT_ID",
            "algorithm": "$ALGORITHM",
            "test_type": "$TEST_TYPE",
            "generation_time": "$GENERATION_TIME",
            "test_duration_seconds": "$DURATION"
        },
        "environment": "$ENVIRONMENT_INFO",
        "summary": "$SUMMARY",
        "algorithm_specific": "$ALGORITHM_SPECIFIC",
        "detailed_results": "$DETAILED_RESULTS",
        "failure_analysis": "$FAILURE_ANALYSIS",
        "performance_metrics": "$PERFORMANCE_METRICS",
        "compliance": "$COMPLIANCE_INFO",
        "recommendations": "$RECOMMENDATIONS"
    }
}

txt_template = """
================================================================================
$ALGORITHM_NAME 测试报告
================================================================================
报告ID: $REPORT_ID
生成时间: $GENERATION_TIME

📊 测试摘要
--------------------------------------------------------------------------------
总测试用例: $TOTAL_TESTS
通过: $PASSED
失败: $FAILED
跳过: $SKIPPED
错误: $ERROR
通过率: $PASS_RATE%

$ALGORITHM_SPECIFIC_SUMMARY

================================================================================
"""

[logging]
# 日志配置
log_level = INFO
log_file = crypto_reporting.log
enable_console_output = true

[extensions]
# 扩展配置
enable_custom_templates = false
custom_template_dir = ./templates
enable_plugin_support = false
plugin_dir = ./plugins